<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Edit Request</title>
</head>
<body style="font-family: 'Quicksand', system-ui, sans-serif; color: #826584; background-color: #FDF4F8; margin: 0; padding: 40px 20px; display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="background: white; padding: 40px; border-radius: 25px; box-shadow: 0 8px 25px rgba(244, 205, 225, 0.4); max-width: 500px; width: 100%;">
        
        <h2 style="text-align: center; color: #826584; border-bottom: 2px dashed #ebc6d9; padding-bottom: 20px;">🛠️ Admin Edit Request</h2>

        <form action="{{ url_for('admin_edit_request', admin_username=admin_username, target_username=target_username, req_id=req_id) }}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            <textarea name="updated_request_details" style="width: 100%; height: 120px; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; font-family: inherit; box-sizing: border-box; background-color: #FCF5F8;">{{ request_text }}</textarea>
            
            <div style="display: flex; gap: 15px;">
                <a href="{{ url_for('admin_panel', admin_username=admin_username) }}" style="background-color: #E8DFF0; color: #7A628B; text-decoration: none; padding: 12px 20px; border-radius: 15px; font-weight: 700; flex-grow: 1; text-align: center;">Cancel</a>
                <button type="submit" style="background-color: #A6D5B4; color: #5A7D65; border: none; padding: 12px 20px; border-radius: 15px; font-weight: 700; cursor: pointer; flex-grow: 1;">Update Request</button>
            </div>
        </form>
    </div>
</body>
</html>
