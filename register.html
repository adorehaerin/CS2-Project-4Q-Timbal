<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Register - Kaiza Corp</title>
</head>
<body style="font-family: 'Quicksand', system-ui, sans-serif; color: #826584; background-color: #FDF4F8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;">
    
    <div class="container floating-container" style="width: 100%; max-width: 489px; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 8px 25px rgba(244, 205, 225, 0.4); text-align: center; box-sizing: border-box;">
        
        <div style="text-align: left; margin-bottom: 20px;">
            <a href="{{ url_for('home') }}" style="color: #A2758E; text-decoration: none; font-weight: bold; font-size: 0.9em;">← Back Home</a>
        </div>
        
        <h2 style="color: #826584; margin-top: 0; margin-bottom: 20px;">New Employee 🍚</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="background-color: #FFE6E6; color: #CC0000; padding: 15px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; font-size: 0.9em;">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            
            <input type="text" name="invite_code" placeholder="Company Invite Code (Required)" style="padding: 15px; border-radius: 15px; border: 2px dashed #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 100%; background-color: #FCF5F8;">
            
            <input type="text" name="username" placeholder="Choose a Username" style="padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 100%;">
            
            <input type="password" name="password" placeholder="Choose a Password" style="padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 100%;">
            
            <input type="text" name="name" placeholder="Full Legal Name" style="padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 100%;">
            
            <div style="display: flex; gap: 15px;">
                <input type="number" name="age" placeholder="Age" style="padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 35%;">
                
                <input type="text" name="address" placeholder="Home Address" style="padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit; font-size: 1em; box-sizing: border-box; width: 65%;">
            </div>

            <button type="submit" style="background-color: #A6D5B4; color: #5A7D65; border: none; padding: 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.05em; margin-top: 10px; width: 100%;">Register Account</button>
        </form>

        <div style="margin-top: 25px; font-size: 0.9em; color: #A2758E; border-top: 2px dashed #F4EEF1; padding-top: 20px;">
            Already have an account? <br>
            <a href="{{ url_for('login') }}" style="color: #826584; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 5px;">Log in here! 🎗️</a>
        </div>

    </div>
</body>
</html>
