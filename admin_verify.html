<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Admin Verification</title>
</head>
<body style="font-family: 'Quicksand', system-ui, sans-serif; color: #826584; background-color: #FDF4F8;">
    
    <div class="container floating-container" style="max-width: 400px; margin: 80px auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 8px 25px rgba(244, 205, 225, 0.4); text-align: center;">
        
        <div style="text-align: left; margin-bottom: 20px;">
            <a href="{{ url_for('login') }}" class="back-btn" style="color: #A2758E; text-decoration: none; font-weight: bold; font-size: 0.9em;">← Cancel</a>
        </div>
        
        <h2 style="color: #826584; margin-top: 0; margin-bottom: 10px;">Security Check 👾</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-msg" style="background-color: #FFE6E6; color: #CC0000; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; font-size: 0.9em;">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <p style="color: #A2758E; margin-bottom: 25px; font-size: 0.95em;">Please enter the 4-digit secret Admin code.</p>

        <form action="{{ url_for('admin_verify', username=username) }}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            
            <input type="password" name="secret_code" placeholder="••••" required style="text-align: center; letter-spacing: 15px; font-size: 1.5em; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; outline: none; color: #826584; font-family: inherit;">
            
            <button type="submit" style="background-color: #A6D5B4; color: #5A7D65; border: none; padding: 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.05em;">Verify Access</button>
        </form>
    </div>
</body>
</html>
