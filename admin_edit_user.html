<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Edit User - Kaiza Corp</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="font-family: 'Quicksand', system-ui, sans-serif; color: #826584; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">
    
    <div class="container floating-container" style="max-width: 650px; width: 100%; background: white; padding: 40px 50px; border-radius: 25px; box-shadow: 0 8px 30px rgba(244, 205, 225, 0.4); max-width: 450px; width: 100%; box-sizing: border-box;">
        
        <a href="{{ url_for('admin_panel', admin_username=admin_username) }}" style="text-decoration: none; color: #A2758E; font-weight: 700; font-size: 0.9em; display: inline-block; margin-bottom: 10px; width: 100%; text-align: left;">
            &larr; Back to Dashboard
        </a>

        <h2 style="text-align: center; color: #826584; margin-top: 5px; margin-bottom: 35px; font-size: 1.8em;">
            Admin Edit ⚙️: {{ user.name }}
        </h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="background-color: #FFE6E6; color: #CC0000; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_edit_user', admin_username=admin_username, target_username=target_username) }}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
            
            <div>
                <label style="text-align: left; font-weight: 700; color: #A2758E; font-size: 0.9em; margin-bottom: 8px; display: block;">Full Name</label>
                <input type="text" name="name" value="{{ user.name }}" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; box-sizing: border-box; color: #826584; font-family: inherit; font-size: 1em; outline: none;">
            </div>
            
            <div>
                <label style="text-align: left; font-weight: 700; color: #A2758E; font-size: 0.9em; margin-bottom: 8px; display: block;">Password</label>
                <input type="text" name="password" value="{{ user.password }}" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; box-sizing: border-box; color: #826584; font-family: inherit; font-size: 1em; outline: none;">
            </div>
            
            <div style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label style="text-align: left; font-weight: 700; color: #A2758E; font-size: 0.9em; margin-bottom: 8px; display: block;">Age</label>
                    <input type="text" name="age" value="{{ user.age }}" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; box-sizing: border-box; color: #826584; font-family: inherit; font-size: 1em; outline: none;">
                </div>
                
                <div style="flex: 2;">
                    <label style="text-align: left; font-weight: 700; color: #A2758E; font-size: 0.9em; margin-bottom: 8px; display: block;">Home Address</label>
                    <input type="text" name="address" value="{{ user.address }}" style="width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #F4CDE1; box-sizing: border-box; color: #826584; font-family: inherit; font-size: 1em; outline: none;">
                </div>
            </div>
            
            <button type="submit" style="background-color: #A6D5B4; color: #5A7D65; border: none; padding: 18px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.05em; margin-top: 10px; font-family: inherit;">
                💾 Update User
            </button>
        </form>
    </div>
</body>
</html>
